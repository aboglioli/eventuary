name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run cargo publish --dry-run only for eventuary-core (no real publish)'
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  RDKAFKA_DEPS: cmake libssl-dev libcurl4-openssl-dev libsasl2-dev zlib1g-dev pkg-config

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install librdkafka build deps
        run: sudo apt-get update && sudo apt-get install -y $RDKAFKA_DEPS

      - name: Verify tag matches workspace version
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not a tag push; skipping version check."
            exit 0
          fi
          tag="${GITHUB_REF_NAME#v}"
          ws_version=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          echo "Tag version:       $tag"
          echo "Workspace version: $ws_version"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match workspace.package.version $ws_version"
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Dry-run publish (eventuary-core only, downstream deps not yet on registry)
        run: cargo publish -p eventuary-core --dry-run --allow-dirty

      - name: Skip real publish (dry-run only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: echo "Dry-run requested; skipping real publish."

      # Tier 1: core has no eventuary-* deps.
      - name: Publish eventuary-core
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-core --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation (core)
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: sleep 60

      # Tier 2: backends + conformance depend on eventuary-core only.
      - name: Publish eventuary-memory
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-memory --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish eventuary-sqlite
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-sqlite --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish eventuary-postgres
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-postgres --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish eventuary-sqs
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-sqs --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish eventuary-kafka
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-kafka --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish eventuary-conformance
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary-conformance --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation (backends)
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: sleep 60

      # Tier 3: umbrella re-exports core + all backends.
      - name: Publish eventuary (umbrella)
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: cargo publish -p eventuary --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
