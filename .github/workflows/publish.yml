name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run cargo publish --dry-run only for eventuary-core (no real publish)'
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  RDKAFKA_DEPS: cmake libssl-dev libcurl4-openssl-dev libsasl2-dev zlib1g-dev pkg-config

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install librdkafka build deps
        run: sudo apt-get update && sudo apt-get install -y $RDKAFKA_DEPS

      - name: Verify tag matches workspace version
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not running on a tag ref; skipping version check."
            exit 0
          fi
          tag="${GITHUB_REF_NAME#v}"
          ws_version=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          echo "Tag version:       $tag"
          echo "Workspace version: $ws_version"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match workspace.package.version $ws_version"
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Dry-run publish (eventuary-core only, downstream deps not yet on registry)
        run: cargo publish -p eventuary-core --dry-run --allow-dirty

      - name: Skip real publish (dry-run only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: echo "Dry-run requested; skipping real publish."

      - name: Publish crates
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATES_IO_USER_AGENT: eventuary-publish-workflow (https://github.com/aboglioli/eventuary)
          PUBLISH_DELAY_SECONDS: '90'
        run: |
          set -euo pipefail

          version=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          packages=(
            eventuary-core
            eventuary-memory
            eventuary-sqlite
            eventuary-postgres
            eventuary-sqs
            eventuary-kafka
            eventuary
          )
          backoffs=(60 180 300 600 900)

          crate_version_exists() {
            local package=$1
            local url="https://crates.io/api/v1/crates/${package}/${version}"
            local status

            for backoff in "${backoffs[@]}"; do
              status=$(curl \
                --silent \
                --show-error \
                --output /dev/null \
                --write-out '%{http_code}' \
                --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
                "$url" || true)

              case "$status" in
                200)
                  return 0
                  ;;
                404)
                  return 1
                  ;;
                429)
                  echo "::notice::crates.io rate limited metadata check for ${package} ${version}; retrying in ${backoff}s"
                  sleep "$backoff"
                  ;;
                *)
                  echo "::warning::crates.io metadata check for ${package} ${version} returned HTTP ${status}; attempting publish"
                  return 1
                  ;;
              esac
            done

            echo "::warning::crates.io metadata check for ${package} ${version} stayed rate limited; attempting publish"
            return 1
          }

          cargo_publish() {
            local package=$1
            local log_file
            local status
            log_file=$(mktemp)

            set +e
            cargo publish -p "$package" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e

            if [ "$status" -eq 0 ]; then
              rm -f "$log_file"
              return 0
            fi

            if grep -Eiq 'already (uploaded|exists)|is already uploaded|crate version .* already exists' "$log_file"; then
              echo "::notice::${package} ${version} is already published; skipping"
              rm -f "$log_file"
              return 76
            fi

            if grep -Eiq 'status 429|Too Many Requests|rate limit' "$log_file"; then
              rm -f "$log_file"
              return 75
            fi

            rm -f "$log_file"
            return "$status"
          }

          publish_package() {
            local package=$1

            if crate_version_exists "$package"; then
              echo "::notice::${package} ${version} is already published; skipping"
              return 0
            fi

            local attempt=1
            local status
            for backoff in "${backoffs[@]}"; do
              echo "Publishing ${package} ${version} (attempt ${attempt}/${#backoffs[@]})"

              set +e
              cargo_publish "$package"
              status=$?
              set -e

              if [ "$status" -eq 0 ]; then
                echo "::notice::published ${package} ${version}"
                sleep "$PUBLISH_DELAY_SECONDS"
                return 0
              fi

              if [ "$status" -eq 76 ]; then
                return 0
              fi

              if [ "$status" -eq 75 ]; then
                echo "::notice::crates.io rate limited ${package} ${version}; retrying in ${backoff}s"
                sleep "$backoff"
                attempt=$((attempt + 1))
                continue
              fi

              echo "::error::failed to publish ${package} ${version}"
              return "$status"
            done

            echo "::error::failed to publish ${package} ${version} after ${#backoffs[@]} attempts"
            return 1
          }

          for package in "${packages[@]}"; do
            publish_package "$package"
          done
